<!DOCTYPE html>
<html>
<head>
    <style>
    .resume-card {
        background: var(--glass);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(10px);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .resume-card:hover {
        transform: scale(1.05);
        border-color: var(--accent-primary);
        background: rgba(59, 130, 246, 0.05);
    }
</style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
 {% if user.is_authenticated %}
        <h2>Welcome, {{ request.user.username }} 👋</h2>

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">

        <div>
            <a href="{% url 'user_logout' %}">Logout</a></div>
        <h5><a href="{% url 'home' %}">create a resume</a></h5>



    </div>

    <h4>My Resumes ({{ resumes|length }})</h4>
    <div class="row">
        {% for resume in resumes %}
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5>{{ resume.name }}</h5>
                    <small class="text-muted">Created: {{ resume.created_at|date:"d M Y" }}</small>
                    <hr>
                    <a href="/media/resumes/resume_{{ resume.id }}.pdf" class="btn btn-primary btn-sm" download>📥 Download PDF</a>
                </div>
            </div>

        </div>
        {% empty %}
        <p>No resumes yet.</p>
        {% endfor %}
    </div>

</div>
{% endif %}
</body>
</html>
