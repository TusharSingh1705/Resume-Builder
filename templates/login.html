<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --surface2: #1a1a24;
      --border:   #2a2a3a;
      --accent:   #7c5cfc;
      --accent2:  #a78bfa;
      --teal:     #14b8a6;
      --text:     #f0eeff;
      --muted:    #8b8aa0;
      --muted2:   #5a5a70;
      --danger:   #ef4444;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 300px at 30% 20%, rgba(124,92,252,0.08), transparent),
        radial-gradient(ellipse 500px 250px at 70% 80%, rgba(20,184,166,0.06), transparent);
      pointer-events: none;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--accent2);
      letter-spacing: -0.5px;
    }

    .auth-logo h1 span { color: var(--teal); }

    .auth-logo p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    /* ── Error messages ── */
    .errorlist {
      list-style: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #f87171;
    }

    .errorlist li { margin-bottom: 4px; }

    /* ── Form ── */
    .auth-card label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 5px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .auth-card input[type="text"],
    .auth-card input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .auth-card input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.15);
    }

    .auth-card input::placeholder {
      color: var(--muted2);
    }

    /* Hide Django's help text */
    .helptext { display: none; }

    .btn-auth {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #5b3fd4);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-auth:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-auth:active { transform:scale(0.98); }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { color: var(--teal); }

    @media (max-width:480px) {
      .auth-card { margin:20px; padding:28px 24px; }
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Resume<span>AI</span></h1>
      <p>Sign in to your account</p>
    </div>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-auth">Login →</button>
    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="{% url 'register' %}">Register here</a>
    </div>
  </div>
</body>
</html>
