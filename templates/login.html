<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    .auth-container {
        max-width: 400px;
        margin: 100px auto;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.1);
        position: relative;
    }
    .auth-container::before {
        content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
        background: linear-gradient(45deg, var(--accent-primary), transparent);
        z-index: -1; border-radius: 26px;
    }
    input {
        width: 100%; background: #000; border: 1px solid #333;
        padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px;
    }
</style>
    <meta charset="UTF-8">
    <title>Login - AI Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 420px; margin: 80px auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="card shadow">
        <div class="card-body p-4">
            <h2 class="text-center mb-4 text-primary">🔑 Login to Your Account</h2>

            <form method="post" >
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
                    Login
                </button>
            </form>

            <p class="text-center mt-4">
                Don't have an account?
                <a href="/register/" class="text-decoration-none">Register here</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
