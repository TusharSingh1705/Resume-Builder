<!DOCTYPE html>
<html>
<head>
    <style>
        .helptext {
    display: none;
}
    .auth-container {
        max-width: 400px;
        margin: 100px auto;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.1);
        position: relative;
    }
    .auth-container::before {
        content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
        background: linear-gradient(45deg, var(--accent-primary), transparent);
        z-index: -1; border-radius: 26px;
    }
    input {
        width: 100%; background: #000; border: 1px solid #333;
        padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px;
    }
</style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center">Create Account</h2>
    <div class="card shadow mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <form method="post">{% csrf_token %}{{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <p class="text-center mt-3">Already have account? <a href="/login/">Login</a></p>
        </div>
    </div>
</div>
</body>
</html>
