<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', system-ui, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#e5e7eb;
}

/* Main card */
.counter-container{
  width:100%;
  max-width:420px;
  padding:36px;
  border-radius:20px;
  background:linear-gradient(145deg,#020617,#020617);
  border:1px solid #1e293b;
  box-shadow:0 30px 60px rgba(0,0,0,.65);
  animation:popUp .9s ease;
}

/* Title */
.title{
  text-align:center;
  font-size:1.8rem;
  margin-bottom:10px;
  color:#38bdf8;
  letter-spacing:1px;
}

/* Messages */
h5{
  text-align:center;
  margin:10px 0;
  font-size:.85rem;
  color:#fb7185;
}

/* Subtitle */
.subtitle{
  margin-top:18px;
  margin-bottom:6px;
  font-size:.8rem;
  color:#94a3b8;
  letter-spacing:.6px;
  text-transform:uppercase;
}

/* Inputs */
input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid #1e293b;
  background:#020617;
  color:#e5e7eb;
  font-size:.95rem;
  transition:.3s ease;
}

input::placeholder{
  color:#64748b;
}

input:focus{
  outline:none;
  border-color:#38bdf8;
  box-shadow:0 0 0 3px rgba(56,189,248,.25);
  transform:translateY(-1px);
}

/* Button container */
.buttons{
  margin-top:28px;
}

/* Button */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#38bdf8,#fb7185);
  color:#020617;
  font-size:1rem;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:.3s ease;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 40px rgba(251,113,133,.55);
}

/* Animations */
@keyframes popUp{
  from{
    opacity:0;
    transform:scale(.9) translateY(30px);
  }
  to{
    opacity:1;
    transform:scale(1) translateY(0);
  }
}

/* Mobile */
@media(max-width:480px){
  .counter-container{
    padding:28px;
  }
  .title{
    font-size:1.6rem;
  }
}
</style>


<body>
  <div class="counter-container">
    <h2 class="title">Sign Up Below</h2>
    {% for message in messages %}
      <h5>{{ message }}</h5>
    {% endfor %}
    <form method="POST" action="register">
      {% csrf_token %}
      <p class="subtitle">Username</p>
      <input type="text" name="username" placeholder="Username">

      <p class="subtitle">Password</p>
      <input type="password" name="password" placeholder="Password">

      <p class="subtitle">Confirm Password</p>
      <input type="password" name="password2" placeholder="Confirm password">

      <div class="buttons">
        <button type="submit" class="btn reset">Register</button>
      </div>
        <div class="subtitle"> Already a user?
    <a href="login">Login</a>
  </div>
    </form>
  </div>
</body>
